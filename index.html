<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Price Ruler</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h2>PRICE RULER</h2>

<div class="toolbar">

<input
id="awal"
type="number"
placeholder="Harga awal">

<button id="set">
SET
</button>

</div>

<div id="ruler"></div>

<div id="info">

<div>Harga Awal :
<span id="awalText">-</span></div>

<div>Harga Sekarang :
<span id="akhirText">-</span></div>

<div>Poin :
<span id="poin">0</span></div>

<div>Persen :
<span id="persen">0%</span></div>

</div>

<script src="script.js"></script>

</body>

</html>
